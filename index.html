<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result-card {
            background: #eef3ff;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>Search Student by USN</h2>
        <input type="text" id="usnInput" placeholder="Enter USN">
        <button onclick="searchStudent()">Search</button>

        <div id="result"></div>
    </div>

    <div class="card">
        <h2>Recruiter Ranking System</h2>

        <label>Branch</label>
        <select id="branchSelect">
            <option value="ALL">ALL</option>
            <option value="CSE">CSE</option>
            <option value="AIDS">AIDS</option>
            <option value="ISE">ISE</option>
        </select>

        <h3>Weights</h3>

        <label>CGPA</label>
        <input type="number" id="cgpaWeight" step="0.1" value="0.5">

        <label>Projects</label>
        <input type="number" id="projectsWeight" step="0.1" value="0.3">

        <label>Hackathons</label>
        <input type="number" id="hackathonsWeight" step="0.1" value="0.2">

        <label>Resume Score</label>
        <input type="number" id="resumeWeight" step="0.1" value="0">

        <label>Top %</label>
        <input type="number" id="percentInput" value="10">

        <button onclick="getRankedStudents()">Get Top Students</button>

        <div id="topResult"></div>
    </div>

</div>

<script>

async function searchStudent(){

    const usn = document.getElementById("usnInput").value;

    const response = await fetch(`http://localhost:3000/api/students/usn/${usn}`);

    if(!response.ok){
        document.getElementById("result").innerHTML = "<p>Student not found</p>";
        return;
    }

    const s = await response.json();

    document.getElementById("result").innerHTML = `
        <div class="result-card">
            <b>${s.name}</b><br>
            Branch: ${s.Branch}<br>
            USN: ${s.USN}<br>
            CGPA: ${s.CGPA}
        </div>
    `;
}

async function getRankedStudents(){

    const branch = document.getElementById("branchSelect").value;

    const weights = {
        CGPA: parseFloat(document.getElementById("cgpaWeight").value),
        projects: parseFloat(document.getElementById("projectsWeight").value),
        hackathons: parseFloat(document.getElementById("hackathonsWeight").value),
        resumeScore: parseFloat(document.getElementById("resumeWeight").value)
    };

    const percent = parseInt(document.getElementById("percentInput").value);

    const response = await fetch("http://localhost:3000/api/students/filter", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            branches: [branch],
            weights: weights,
            percent: percent
        })
    });

    const data = await response.json();

    let html = `<h3>Top ${percent}% Students</h3>`;

    data.forEach((s, index) => {
        html += `
            <div class="result-card">
                <b>#${index+1} ${s.name}</b><br>
                Score: ${s.score.toFixed(2)}<br>
                CGPA: ${s.CGPA}
            </div>
        `;
    });

    document.getElementById("topResult").innerHTML = html;
}

</script>

</body>
</html>
